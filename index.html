<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Recovery Room — Story Generator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#1a1a1a;padding:1.5rem;color:#eee}
.app{display:grid;grid-template-columns:280px 1fr;gap:1.5rem;align-items:start}
.panel{background:#242424;border:1px solid #333;border-radius:12px;padding:1.25rem;display:flex;flex-direction:column;gap:.9rem}
.panel h3{font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.08em}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;color:#aaa;display:flex;justify-content:space-between}
.field input,.field textarea{font-size:14px;padding:8px 10px;border:1px solid #444;border-radius:8px;background:#1a1a1a;color:#eee;font-family:inherit;outline:none}
.field input:focus,.field textarea:focus{border-color:#E8632A}
.field textarea{height:68px;resize:none}
.templates{display:flex;flex-wrap:wrap;gap:6px}
.tpl-btn{font-size:11px;padding:5px 10px;border:1px solid #444;border-radius:6px;cursor:pointer;background:#1a1a1a;color:#aaa;transition:all .15s}
.tpl-btn.active{background:#E8632A;color:#fff;border-color:#E8632A}
.bg-opts{display:flex;gap:8px}
.bg-swatch{width:30px;height:30px;border-radius:6px;border:3px solid transparent;cursor:pointer;transition:border-color .15s}
.bg-swatch.active{border-color:#E8632A}
.preview-wrap{display:flex;flex-direction:column;align-items:center;gap:.6rem}
.preview-label{font-size:11px;color:#666}
.canvas-container{border-radius:10px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.5)}
canvas{display:block}
.dl-btn{width:100%;padding:11px;background:#E8632A;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.03em;transition:opacity .15s}
.dl-btn:hover{opacity:.85}
.divider{height:1px;background:#333}
.safe-note{font-size:10px;color:#555;text-align:center}
</style>
</head>
<body>
<div class="app">
  <div class="panel">
    <h3>Template</h3>
    <div class="templates">
      <button class="tpl-btn active" onclick="setTpl('dato',this)">📊 Dato</button>
      <button class="tpl-btn" onclick="setTpl('detras',this)">🎬 Detrás</button>
      <button class="tpl-btn" onclick="setTpl('cta',this)">🚀 CTA</button>
      <button class="tpl-btn" onclick="setTpl('poll',this)">📣 Poll</button>
      <button class="tpl-btn" onclick="setTpl('motivacional',this)">💪 Motiv.</button>
    </div>
    <div class="divider"></div>
    <h3>Contenido</h3>
    <div class="field">
      <label>Headline <span id="hl-cnt">0/50</span></label>
      <input type="text" id="headline" maxlength="50" placeholder="Tu titular aquí..." oninput="upd()">
    </div>
    <div class="field">
      <label>Copy <span id="cp-cnt">0/100</span></label>
      <textarea id="copy" maxlength="100" placeholder="Texto de apoyo..." oninput="upd()"></textarea>
    </div>
    <div class="field" id="cta-field">
      <label>CTA <span id="cta-cnt">0/35</span></label>
      <input type="text" id="cta" maxlength="35" placeholder="Reservá tu sesión" oninput="upd()">
    </div>
    <div class="divider"></div>
    <h3>Fondo</h3>
    <div class="bg-opts">
      <div class="bg-swatch active" style="background:#0A3A52" onclick="setBg('#0A3A52',this)" title="Navy"></div>
      <div class="bg-swatch" style="background:#fff;border-color:#555" onclick="setBg('#ffffff',this)" title="Blanco"></div>
      <div class="bg-swatch" style="background:#B8E4F4" onclick="setBg('#B8E4F4',this)" title="Cyan"></div>
    </div>
    <div class="divider"></div>
    <button class="dl-btn" onclick="download()">⬇ Descargar PNG 1080×1920</button>
  </div>
  <div class="preview-wrap">
    <div class="preview-label">Preview — canvas real 1080×1920 px</div>
    <div class="canvas-container"><canvas id="cv"></canvas></div>
    <div class="safe-note">🔒 Zona segura Instagram activa</div>
  </div>
</div>

<script>
const W=1080, H=1920;
const PH=620; // altura preview pantalla
const NAVY='#0A3A52', ORANGE='#E8632A', CYAN='#B8E4F4', WHITE='#fff';
let tpl='dato', bg=NAVY;

function setTpl(t,el){
  tpl=t;
  document.querySelectorAll('.tpl-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('cta-field').style.display=(t==='poll')?'none':'flex';
  upd();
}
function setBg(col,el){
  bg=col;
  document.querySelectorAll('.bg-swatch').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  upd();
}
function upd(){
  const hl=v('headline'), cp=v('copy'), ct=v('cta');
  cnt('hl-cnt',hl,50); cnt('cp-cnt',cp,100); cnt('cta-cnt',ct,35);
  const cv=document.getElementById('cv');
  const s=PH/H;
  cv.width=Math.round(W*s); cv.height=PH;
  render(cv,s,hl,cp,ct);
}
function v(id){return document.getElementById(id).value;}
function cnt(id,val,max){document.getElementById(id).textContent=val.length+'/'+max;}

// ── RENDER PRINCIPAL ────────────────────────────────────────────────
function render(canvas,s,hl,cp,ct){
  const c=canvas.getContext('2d');
  c.clearRect(0,0,canvas.width,canvas.height);

  // Fondo
  c.fillStyle=bg; c.fillRect(0,0,canvas.width,canvas.height);

  const dark=bg===NAVY;
  const cMain = dark?WHITE:NAVY;
  const cSub  = dark?CYAN:'#1a5f7a';

  // Barra lateral naranja
  const barG=c.createLinearGradient(0,260*s,0,1700*s);
  barG.addColorStop(0,ORANGE); barG.addColorStop(1,'rgba(232,99,42,0.08)');
  c.fillStyle=barG;
  pill(c,26*s,270*s,6*s,1420*s,3*s); c.fill();

  // ── HEADER zona segura top (y 260–400) ──
  c.font=`800 ${32*s}px system-ui,sans-serif`;
  c.fillStyle=ORANGE; c.fillText('RR',72*s,336*s);
  c.font=`400 ${24*s}px system-ui,sans-serif`;
  c.fillStyle=cSub; c.fillText('Recovery Room',120*s,336*s);
  sep(c,72*s,(W-72)*s,380*s,dark);

  // ── CONTENIDO ──
  if(tpl==='dato')         tDato(c,s,hl,cp,ct,cMain,cSub,dark);
  else if(tpl==='detras')  tDetras(c,s,hl,cp,ct,cMain,cSub,dark);
  else if(tpl==='cta')     tCTA(c,s,hl,cp,ct,cMain,cSub,dark);
  else if(tpl==='poll')    tPoll(c,s,hl,cp,cMain,cSub,dark);
  else                     tMot(c,s,hl,cp,ct,cMain,cSub,dark);

  // ── FOOTER zona segura bot (y 1680–1780) ──
  sep(c,72*s,(W-72)*s,1690*s,dark);
  c.font=`400 ${22*s}px system-ui,sans-serif`;
  c.fillStyle=cSub; c.textAlign='center';
  c.fillText('San Juan, Argentina',(W/2)*s,1745*s);
  c.textAlign='left';
}

// ════════════════════════════════════════════════════════
// TEMPLATE 1 — DATO
// Concepto: número/stat ocupa protagonismo total
// Layout:
//   Etiqueta pequeña      y 450
//   HEADLINE GIGANTE      y 560–900  (fuente 110px, naranja)
//   Línea divisora        y 940
//   Copy descriptivo      y 1010–1150
//   CTA botón             y 1480
// ════════════════════════════════════════════════════════
function tDato(c,s,hl,cp,ct,cMain,cSub,dark){
  // Etiqueta
  label(c,s,'DATO',450,dark);

  // Headline gigante
  const hlTxt=hl||'El frío no duele,\nrecupera.';
  const hlLines=wrapL(c,hlTxt,`800 ${110*s}px system-ui,sans-serif`,(W-144)*s);
  c.font=`800 ${110*s}px system-ui,sans-serif`;
  c.fillStyle=ORANGE;
  hlLines.slice(0,3).forEach((l,i)=>c.fillText(l,72*s,(560+i*126)*s));

  // Divisor
  const divY=560+(hlLines.slice(0,3).length*126)+40;
  c.strokeStyle=dark?'rgba(184,228,244,0.2)':'rgba(10,58,82,0.15)';
  c.lineWidth=1.5*s;
  c.beginPath(); c.moveTo(72*s,divY*s); c.lineTo(480*s,divY*s); c.stroke();

  // Copy
  const cpTxt=cp||'3 minutos en agua fría activan vasoconstricción y reducen el DOMS hasta un 30%.';
  const cpLines=wrapL(c,cpTxt,`400 ${34*s}px system-ui,sans-serif`,(W-144)*s);
  c.font=`400 ${34*s}px system-ui,sans-serif`;
  c.fillStyle=cMain;
  cpLines.slice(0,3).forEach((l,i)=>c.fillText(l,72*s,(divY+80+i*50)*s));

  // CTA
  if(ct) ctaBtn(c,s,ct,1480);
}

// ════════════════════════════════════════════════════════
// TEMPLATE 2 — DETRÁS
// Concepto: humanizar la marca, mostrar proceso
// Layout:
//   Etiqueta              y 450
//   Ícono grande centrado y 560–780
//   Headline              y 860  (fuente 72px, blanco)
//   Copy                  y 1060
//   CTA                   y 1480
// ════════════════════════════════════════════════════════
function tDetras(c,s,hl,cp,ct,cMain,cSub,dark){
  label(c,s,'BEHIND THE SCENES',450,dark);

  // Ícono con círculo
  c.fillStyle=dark?'rgba(184,228,244,0.07)':'rgba(10,58,82,0.06)';
  c.beginPath(); c.arc((W/2)*s,670*s,110*s,0,Math.PI*2); c.fill();
  c.strokeStyle=ORANGE; c.lineWidth=2*s;
  c.beginPath(); c.arc((W/2)*s,670*s,110*s,0,Math.PI*2); c.stroke();
  c.font=`${100*s}px system-ui,sans-serif`;
  c.textAlign='center'; c.fillText('🎬',(W/2)*s,710*s); c.textAlign='left';

  // Headline
  const hlLines=wrapL(c,hl||'Así es un día en Recovery Room.',`700 ${72*s}px system-ui,sans-serif`,(W-144)*s);
  c.font=`700 ${72*s}px system-ui,sans-serif`; c.fillStyle=cMain;
  hlLines.slice(0,2).forEach((l,i)=>c.fillText(l,72*s,(880+i*86)*s));

  // Copy
  const cpLines=wrapL(c,cp||'Cada detalle está pensado para que tu recuperación sea efectiva.',`400 ${34*s}px system-ui,sans-serif`,(W-144)*s);
  c.font=`400 ${34*s}px system-ui,sans-serif`; c.fillStyle=cSub;
  cpLines.slice(0,3).forEach((l,i)=>c.fillText(l,72*s,(1100+i*48)*s));

  if(ct) ctaBtn(c,s,ct,1480);
}

// ════════════════════════════════════════════════════════
// TEMPLATE 3 — CTA
// Concepto: urgencia y conversión directa
// Layout:
//   Etiqueta urgencia     y 440
//   Headline grande       y 560  (fuente 90px, naranja)
//   Copy                  y 960
//   Bloque beneficios     y 1100–1300  (3 líneas con ✓)
//   CTA botón grande      y 1460
// ════════════════════════════════════════════════════════
function tCTA(c,s,hl,cp,ct,cMain,cSub,dark){
  label(c,s,'OFERTA',440,dark);

  const hlLines=wrapL(c,hl||'Primera sesión con 20% OFF',`800 ${90*s}px system-ui,sans-serif`,(W-144)*s);
  c.font=`800 ${90*s}px system-ui,sans-serif`; c.fillStyle=ORANGE;
  hlLines.slice(0,3).forEach((l,i)=>c.fillText(l,72*s,(580+i*106)*s));

  const cpY=580+(hlLines.slice(0,3).length*106)+60;
  const cpLines=wrapL(c,cp||'Solo esta semana. Cupos limitados.',`400 ${36*s}px system-ui,sans-serif`,(W-144)*s);
  c.font=`400 ${36*s}px system-ui,sans-serif`; c.fillStyle=cMain;
  cpLines.slice(0,2).forEach((l,i)=>c.fillText(l,72*s,(cpY+i*50)*s));

  // Beneficios ✓
  const bY=cpY+160;
  const items=['Sauna finlandesa','Crioterapia profesional','Reserva online'];
  c.font=`500 ${30*s}px system-ui,sans-serif`;
  items.forEach((item,i)=>{
    c.fillStyle=ORANGE; c.fillText('✓',72*s,(bY+i*52)*s);
    c.fillStyle=cMain;  c.fillText(item,120*s,(bY+i*52)*s);
  });

  ctaBtn(c,s,ct||'Reservar ahora',1460);
}

// ════════════════════════════════════════════════════════
// TEMPLATE 4 — POLL
// Concepto: máximo engagement, interacción binaria
// Layout:
//   Etiqueta              y 440
//   Pregunta grande       y 560  (fuente 88px)
//   Copy                  y 840
//   Botones FRÍO/SAUNA    y 1060–1240  (altura generosa)
//   Micro-copy            y 1320
// ════════════════════════════════════════════════════════
function tPoll(c,s,hl,cp,cMain,cSub,dark){
  label(c,s,'VOTÁ',440,dark);

  const hlLines=wrapL(c,hl||'¿Qué preferís después de entrenar?',`700 ${82*s}px system-ui,sans-serif`,(W-144)*s);
  c.font=`700 ${82*s}px system-ui,sans-serif`; c.fillStyle=cMain;
  hlLines.slice(0,3).forEach((l,i)=>c.fillText(l,72*s,(580+i*96)*s));

  const cpTxt=cp||'Contanos tu favorito 👇';
  c.font=`400 ${32*s}px system-ui,sans-serif`; c.fillStyle=cSub;
  c.fillText(cpTxt,72*s,900*s);

  // Botón FRÍO
  const bw=(W-168)/2, bh=200, gap=24;
  c.fillStyle='#0d3d54';
  pill(c,72*s,1040*s,bw*s,bh*s,20*s); c.fill();
  c.strokeStyle=CYAN; c.lineWidth=2.5*s;
  pill(c,72*s,1040*s,bw*s,bh*s,20*s); c.stroke();
  c.font=`700 ${44*s}px system-ui,sans-serif`;
  c.fillStyle=CYAN; c.textAlign='center';
  c.fillText('🧊',(72+bw/2)*s,1120*s);
  c.font=`700 ${36*s}px system-ui,sans-serif`;
  c.fillText('FRÍO',(72+bw/2)*s,1175*s);

  // Botón SAUNA
  const sx=72+bw+gap;
  c.fillStyle='rgba(232,99,42,0.12)';
  pill(c,sx*s,1040*s,bw*s,bh*s,20*s); c.fill();
  c.strokeStyle=ORANGE; c.lineWidth=2.5*s;
  pill(c,sx*s,1040*s,bw*s,bh*s,20*s); c.stroke();
  c.fillStyle=ORANGE;
  c.font=`700 ${44*s}px system-ui,sans-serif`;
  c.fillText('🔥',(sx+bw/2)*s,1120*s);
  c.font=`700 ${36*s}px system-ui,sans-serif`;
  c.fillText('SAUNA',(sx+bw/2)*s,1175*s);
  c.textAlign='left';

  // Micro-copy
  c.font=`400 ${26*s}px system-ui,sans-serif`;
  c.fillStyle=dark?'rgba(184,228,244,0.4)':'rgba(10,58,82,0.4)';
  c.textAlign='center';
  c.fillText('Ambos disponibles en Recovery Room',(W/2)*s,1310*s);
  c.textAlign='left';
}

// ════════════════════════════════════════════════════════
// TEMPLATE 5 — MOTIVACIONAL
// Concepto: frase impacto, headline domina toda la story
// Layout:
//   Línea de crédito top  y 450  (pequeño, cyan)
//   FRASE GIGANTE         y 560–1200  (fuente 96px, blanco, serif)
//   Línea autora          y 1280
//   CTA                   y 1460
// ════════════════════════════════════════════════════════
function tMot(c,s,hl,cp,ct,cMain,cSub,dark){
  // Comilla abierta decorativa — grande, bien posicionada
  c.font=`900 ${260*s}px Georgia,serif`;
  c.fillStyle='rgba(232,99,42,0.15)';
  c.fillText('\u201C',52*s,660*s);

  // Etiqueta pequeña arriba
  c.font=`600 ${22*s}px system-ui,sans-serif`;
  c.fillStyle=ORANGE;
  c.fillText('MOTIVACIÓN',72*s,460*s);

  // Frase principal — grande, dominante
  const hlTxt=hl||'La recuperación es parte del entrenamiento.';
  const hlLines=wrapL(c,hlTxt,`italic 300 ${90*s}px Georgia,serif`,(W-180)*s);
  c.font=`italic 300 ${90*s}px Georgia,serif`;
  c.fillStyle=cMain;
  hlLines.slice(0,5).forEach((l,i)=>c.fillText(l,72*s,(580+i*108)*s));

  // Comilla cierre
  const closeY=580+(hlLines.slice(0,5).length*108)+20;
  c.font=`900 ${140*s}px Georgia,serif`;
  c.fillStyle='rgba(232,99,42,0.15)';
  c.textAlign='right';
  c.fillText('\u201D',(W-72)*s,closeY*s);
  c.textAlign='left';

  // Línea autora
  c.fillStyle=ORANGE; c.fillRect(72*s,(closeY+60)*s,60*s,3*s);
  c.font=`500 ${26*s}px system-ui,sans-serif`;
  c.fillStyle=cSub;
  const subTxt=cp||'Recovery Room · San Juan';
  c.fillText(subTxt,72*s,(closeY+110)*s);

  if(ct) ctaBtn(c,s,ct,1460);
}

// ── HELPERS ─────────────────────────────────────────────────────────

function label(c,s,txt,y,dark){
  c.font=`700 ${20*s}px system-ui,sans-serif`;
  const tw=c.measureText(txt).width;
  const pw=tw+44*s, ph=38*s, cx=(W/2)*s;
  c.fillStyle=dark?'rgba(232,99,42,0.15)':'rgba(232,99,42,0.1)';
  pill(c,cx-pw/2,y*s,pw,ph,ph/2); c.fill();
  c.strokeStyle=ORANGE; c.lineWidth=1.5*s;
  pill(c,cx-pw/2,y*s,pw,ph,ph/2); c.stroke();
  c.fillStyle=ORANGE; c.textAlign='center';
  c.fillText(txt,cx,(y+26)*s);
  c.textAlign='left';
}

function ctaBtn(c,s,txt,cy){
  c.font=`700 ${36*s}px system-ui,sans-serif`;
  const disp=txt.length>28?txt.slice(0,28)+'…':txt;
  const tw=c.measureText(disp).width;
  const bw=Math.min(tw+110*s,(W-160)*s), bh=100*s, cx=(W/2)*s;
  c.fillStyle=ORANGE;
  pill(c,cx-bw/2,cy*s-bh/2,bw,bh,bh/2); c.fill();
  // Subtle inner highlight
  c.fillStyle='rgba(255,255,255,0.08)';
  pill(c,cx-bw/2,cy*s-bh/2,bw,bh/2,bh/2); c.fill();
  c.fillStyle=WHITE; c.textAlign='center';
  c.fillText(disp,cx,cy*s+13*s);
  c.textAlign='left';
}

function sep(c,x1,x2,y,dark){
  c.strokeStyle=dark?'rgba(184,228,244,0.15)':'rgba(10,58,82,0.12)';
  c.lineWidth=1; c.beginPath(); c.moveTo(x1,y); c.lineTo(x2,y); c.stroke();
}

function wrapL(c,txt,font,maxW){
  c.font=font;
  const words=txt.replace(/\n/g,' \n ').split(' ');
  const lines=[]; let line='';
  for(const w of words){
    if(w==='\n'){lines.push(line);line='';continue;}
    const t=line?line+' '+w:w;
    if(c.measureText(t).width>maxW&&line){lines.push(line);line=w;}
    else line=t;
  }
  if(line) lines.push(line);
  return lines;
}

function pill(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y);
  c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y);
  c.closePath();
}

// ── DESCARGA ────────────────────────────────────────────────────────
function download(){
  const hl=v('headline'), cp=v('copy'), ct=v('cta');
  const hi=document.createElement('canvas');
  hi.width=W; hi.height=H;
  render(hi,1,hl,cp,ct);
  hi.toBlob(blob=>{
    if(!blob){alert('Error al generar PNG. Usá Chrome o Edge.');return;}
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='rr_story_'+tpl+'.png';
    document.body.appendChild(a); a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1000);
  },'image/png');
}

upd();
</script>
</body>
</html>
